services:
  medical-innovation-agent:
    build: .
    container_name: medical-innovation-agent
    restart: unless-stopped
    ports:
      - "${PORT:-8046}:8046"
    env_file:
      - .env
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?err}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:?err}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:?err}
      - INFOX_MED_TOKEN=${INFOX_MED_TOKEN:-}
      - WORKERS=${WORKERS:-4}
      - TIMEOUT=${TIMEOUT:-600}
      - WORKER_CONNECTIONS=${WORKER_CONNECTIONS:-1000}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2G"
        reservations:
          cpus: "0.5"
          memory: "512M"
